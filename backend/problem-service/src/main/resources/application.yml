server:
  port: ${SERVER_PORT:8202}

spring:
  application:
    name: ai-oj-problem-service
  config:
    import: optional:nacos:${spring.application.name}.yml
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/ai_oj_next?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USER:aioj}
    password: ${MYSQL_PASSWORD:change-me}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_DEFAULT_USER:guest}
    password: ${RABBITMQ_DEFAULT_PASS:guest}
    listener:
      simple:
        acknowledge-mode: manual
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    clean-disabled: true
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_ENABLED:false}
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      config:
        enabled: ${NACOS_ENABLED:false}
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        file-extension: yml
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}

aioj:
  internal:
    api-token: ${AIOJ_INTERNAL_API_TOKEN:}
  testcase:
    storage-root: ${AIOJ_TESTCASE_STORAGE_ROOT:${user.home}/.ai-oj-next/testcases}
    max-package-bytes: ${AIOJ_TESTCASE_MAX_PACKAGE_BYTES:134217728}
    chunk-size-bytes: ${AIOJ_TESTCASE_CHUNK_SIZE_BYTES:4194304}
    max-uncompressed-bytes: ${AIOJ_TESTCASE_MAX_UNCOMPRESSED_BYTES:536870912}
    max-entry-count: ${AIOJ_TESTCASE_MAX_ENTRY_COUNT:2000}
  security:
    jwt:
      issuer: ${JWT_ISSUER:ai-oj-next}
      hmac-secret: ${JWT_HMAC_SECRET:replace-with-at-least-32-bytes-dev-secret}
      private-key-pem: ${JWT_PRIVATE_KEY_PEM:}
      public-key-pem: ${JWT_PUBLIC_KEY_PEM:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,flyway
  endpoint:
    health:
      probes:
        enabled: true
