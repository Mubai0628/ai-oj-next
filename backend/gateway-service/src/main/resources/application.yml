server:
  port: ${SERVER_PORT:8101}

spring:
  application:
    name: ai-oj-gateway-service
  config:
    import: optional:nacos:${spring.application.name}.yml
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_ENABLED:false}
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      config:
        enabled: ${NACOS_ENABLED:false}
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        file-extension: yml
    sentinel:
      filter:
        enabled: false
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}
    gateway:
      default-filters:
        - PreserveHostHeader
      globalcors:
        cors-configurations:
          "[/**]":
            allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
            allowed-methods: "*"
            allowed-headers: "*"
            exposed-headers: "Authorization,X-Trace-Id"
            allow-credentials: true
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URI:http://localhost:8201}
          predicates:
            - Path=/api/v1/auth/**,/api/v1/users/**,/api/v1/admin/users/**,/api/v1/admin/roles/**
          filters:
            - StripPrefix=2
        - id: problem-service
          uri: ${PROBLEM_SERVICE_URI:http://localhost:8202}
          predicates:
            - Path=/api/v1/problems/**,/api/v1/problem-sets/**,/api/v1/submissions/**
          filters:
            - StripPrefix=2
        - id: ai-service
          uri: ${AI_SERVICE_URI:http://localhost:8204}
          predicates:
            - Path=/api/v1/ai/**,/api/v1/admin/problem-drafts/**
          filters:
            - StripPrefix=2

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      probes:
        enabled: true
    gateway:
      access: read_only

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
