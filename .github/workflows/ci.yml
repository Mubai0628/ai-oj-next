name: ai-oj-next-ci

on:
  push:
    paths:
      - "ai-oj-next/**"
  pull_request:
    paths:
      - "ai-oj-next/**"
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-oj-next/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - run: mvn -B -DskipTests package
      - run: mvn -B test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-oj-next
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ai-oj-next/package-lock.json
      - run: npm install
      - run: npm run typecheck
      - run: npm run build

